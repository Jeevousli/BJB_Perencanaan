version: '3.8'

services:
  # 1. Service Database PostgreSQL
  postgres_db:
    image: postgres:15-alpine
    container_name: bjb_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 17072005
      POSTGRES_DB: bjb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Service Backend Express.js
  # Pakai image dari GHCR — VPS tidak perlu source code untuk build
  backend:
    image: ghcr.io/jeevousli/bjb_perencanaan/backend:latest
    container_name: bjb_backend
    restart: always
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    depends_on:
      postgres_db:
        condition: service_healthy

  # 3. Service Frontend Next.js
  # Pakai image dari GHCR — VPS tidak perlu source code untuk build
  frontend:
    image: ghcr.io/jeevousli/bjb_perencanaan/frontend:latest
    container_name: bjb_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://20.200.214.101:4000
    depends_on:
      - backend

volumes:
  postgres_data:
